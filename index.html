// ════════════════════════════════════════════════════════════════
// LAYOUT-MOTOR
// Subnoder placeras i en ring runt kategorinoden.
// Inga manuella vinklar – kollisionsfri automatisk fördelning.
// ════════════════════════════════════════════════════════════════
let activeWeekIdx=WEEKS.length-1;
let T={x:0,y:0,s:1},CX,CY,dragging=false,sx,sy,stx,sty;
let pinching=false,lastDist=0,pinchMid={x:0,y:0};
const ml=document.getElementById('ml'),sl=document.getElementById('sl');

function r2d(d){return d*Math.PI/180;}
function gp(cx,cy,deg,dist){return{x:cx+Math.cos(r2d(deg))*dist,y:cy+Math.sin(r2d(deg))*dist};}
function mk(tag,cls){const e=document.createElement(tag);e.className=cls;return e;}
function ln(x1,y1,x2,y2,stroke,sw,op,dash){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',stroke);l.setAttribute('stroke-width',sw);l.setAttribute('stroke-opacity',op);
  if(dash)l.setAttribute('stroke-dasharray',dash);
  sl.appendChild(l);return l;
}

function getScale(){
  const w=window.innerWidth,h=window.innerHeight,s=Math.min(w,h),mob=w<600;
  return{cat:mob?s*.26:Math.min(s*.25,240),sub:mob?s*.46:Math.min(s*.46,460)};
}

// Beräknar optimala subnodvinklar kring en kategoripunkt
// Subnoderna sprids symmetriskt inom en öppen kil som pekar utåt från centrum
function subAngles(catAngle,n){
  if(n===0)return[];
  if(n===1)return[catAngle];
  // Öppen kil: max 100° total spread, centrerat på catAngle
  // Subnoderna pekar bort från centrum så vi lägger dem på samma sida
  const maxSpread=Math.min(100,n*22);
  const step=maxSpread/(n-1);
  const start=catAngle-maxSpread/2;
  return Array.from({length:n},(_,i)=>start+i*step);
}

function build(){
  CX=window.innerWidth/2; CY=window.innerHeight/2;
  ml.innerHTML=''; sl.innerHTML='';
  sl.setAttribute('viewBox',`0 0 ${window.innerWidth} ${window.innerHeight}`);
  applyT();
  const wk=WEEKS[activeWeekIdx];
  const {cat:catD,sub:subD}=getScale();

  // Centrum
  const c=mk('div','cn');
  c.style.cssText=`left:${CX}px;top:${CY}px`;
  c.innerHTML=`<div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <div class="ct">Svensk<br>OSINT</div>
    <div class="cs">V.${wk.w} · ${wk.date.split(' ')[0].toUpperCase()} ${wk.year}</div>`;
  ml.appendChild(c);

  wk.cats.forEach(cat=>{
    const cp=gp(CX,CY,cat.a,catD);
    ln(CX,CY,cp.x,cp.y,cat.color,1.5,.3,'');
    const cn=mk('div',`catn ${cat.cs}`);
    cn.style.cssText=`left:${cp.x}px;top:${cp.y}px`;
    cn.dataset.cid=cat.id;
    cn.innerHTML=`<span class="cdot" style="background:${cat.color}"></span>${cat.l}`;
    cn.addEventListener('click',e=>{e.stopPropagation();actCat(cat,cn);});
    ml.appendChild(cn);

    const angles=subAngles(cat.a,cat.subs.length);
    cat.subs.forEach((sub,i)=>{
      const sp=gp(CX,CY,angles[i],subD);
      ln(cp.x,cp.y,sp.x,sp.y,cat.color,1,.15,'4,5');
      const sn=mk('div',`subn ss${cat.id[0].toUpperCase()+cat.id.slice(1)}`);
      sn.style.cssText=`left:${sp.x}px;top:${sp.y}px;position:absolute`;
      sn.dataset.sid=sub.id;sn.dataset.cid=cat.id;
      sn.textContent=sub.l;
      const b=mk('span','sbadge');
      b.textContent=sub.arts.length;b.style.background=cat.color;
      sn.appendChild(b);
      sn.addEventListener('click',e=>{e.stopPropagation();openP(cat,sub);});
      ml.appendChild(sn);
    });
  });

  document.getElementById('topbar-week').textContent=`VECKOBREV · V.${wk.w} · ${wk.date.toUpperCase()}`;
}

function openP(cat,sub){
  document.getElementById('pr').textContent=cat.l.toUpperCase();
  document.getElementById('pr').style.color=cat.color;
  document.getElementById('pt').textContent=sub.l;
  document.getElementById('pc').textContent=`${sub.arts.length} INLÄGG / ARTIKLAR`;
  const list=document.getElementById('pl');list.innerHTML='';
  sub.arts.forEach(art=>{
    const a=document.createElement('a');
    a.className='ai';a.href=art.u;a.target='_blank';a.rel='noopener noreferrer';
    a.innerHTML=`<div class="ait">${art.t}</div><div class="aim"><span style="color:${cat.color};font-size:7px">●</span>${cat.l}<span style="opacity:.4">↗</span></div>`;
    list.appendChild(a);
  });
  document.querySelectorAll('.subn').forEach(n=>n.classList.remove('act'));
  document.querySelector(`[data-sid="${sub.id}"]`)?.classList.add('act');
  document.getElementById('panel').classList.add('open');
}
function closeP(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.subn').forEach(n=>n.classList.remove('act'));
}
function fcat(id){
  const wk=WEEKS[activeWeekIdx];
  document.querySelectorAll('.catn').forEach(n=>n.style.opacity=(!id||n.dataset.cid===id)?'1':'.15');
  document.querySelectorAll('.subn').forEach(n=>n.style.opacity=(!id||n.dataset.cid===id)?'1':'.08');
  sl.querySelectorAll('line').forEach(l=>{
    l.style.opacity=id?(l.getAttribute('stroke')===(wk.cats.find(c=>c.id===id)?.color)?'1':'.08'):'1';
  });
  if(!id)document.querySelectorAll('.catn').forEach(n=>n.classList.remove('act'));
}
function actCat(cat,node){
  document.querySelectorAll('.catn').forEach(n=>n.classList.remove('act'));
  node.classList.add('act');fcat(cat.id);
}
function applyT(){
  const t=`translate(${T.x}px,${T.y}px) scale(${T.s})`;
  ml.style.transform=sl.style.transform=t;
  ml.style.transformOrigin=sl.style.transformOrigin='0 0';
}

// Veckoväljare
function buildWkSelector(){
  const list=document.getElementById('wk-list');list.innerHTML='';
  const years=[...new Set(WEEKS.map(w=>w.year))];
  years.forEach(yr=>{
    const lbl=document.createElement('div');lbl.className='wk-year-label';lbl.textContent=yr;list.appendChild(lbl);
    WEEKS.forEach((wk,idx)=>{
      if(wk.year!==yr)return;
      const item=document.createElement('div');
      item.className='wk-item'+(idx===activeWeekIdx?' active':'');
      const dots=['sv','no','eu','ov'].map(id=>{
        const has=wk.cats.some(c=>c.id===id&&c.subs.some(s=>s.arts.length>0));
        const col={'sv':'#4a9eff','no':'#3de8b0','eu':'#f5a041','ov':'#f04e7c'}[id];
        return`<span class="wk-dot${has?' has':''}" style="background:${col}"></span>`;
      }).join('');
      item.innerHTML=`<span class="wk-num">V.${wk.w}</span><span class="wk-date">${wk.date}</span><span class="wk-dots">${dots}</span>`;
      item.addEventListener('click',()=>switchWeek(idx));
      list.appendChild(item);
    });
  });
}
function switchWeek(idx){
  activeWeekIdx=idx;
  document.getElementById('wk-selector').classList.remove('open');
  document.getElementById('wk-current').textContent=`V.${WEEKS[idx].w}`;
  fcat(null);closeP();T={x:0,y:0,s:1};build();buildWkSelector();
}
function toggleWkSelector(){document.getElementById('wk-selector').classList.toggle('open');}
document.addEventListener('click',e=>{
  if(!e.target.closest('#wk-selector'))document.getElementById('wk-selector').classList.remove('open');
});

// Mus
const cw=document.getElementById('cw');
cw.addEventListener('mousedown',e=>{
  if(e.target.closest('#panel,#legend,#zc,#hud,#topbar,#wk-selector'))return;
  dragging=true;sx=e.clientX;sy=e.clientY;stx=T.x;sty=T.y;document.body.classList.add('drag');
});
document.addEventListener('mousemove',e=>{if(!dragging)return;T.x=stx+e.clientX-sx;T.y=sty+e.clientY-sy;applyT();});
document.addEventListener('mouseup',()=>{dragging=false;document.body.classList.remove('drag');});
document.addEventListener('wheel',e=>{
  if(e.target.closest('#panel'))return;e.preventDefault();
  const f=e.deltaY>0?.9:1.1,ns=Math.min(Math.max(T.s*f,.15),5);
  const wx=(e.clientX-T.x)/T.s,wy=(e.clientY-T.y)/T.s;
  T.s=ns;T.x=e.clientX-wx*ns;T.y=e.clientY-wy*ns;applyT();
},{passive:false});

// Touch
cw.addEventListener('touchstart',e=>{
  if(e.target.closest('#panel,#legend,#zc,#hud,#topbar,#wk-selector'))return;
  if(e.touches.length===1){dragging=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;stx=T.x;sty=T.y;}
  else if(e.touches.length===2){dragging=false;pinching=true;
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    lastDist=Math.hypot(dx,dy);
    pinchMid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};}
},{passive:true});
cw.addEventListener('touchmove',e=>{
  if(e.target.closest('#panel'))return;e.preventDefault();
  if(pinching&&e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy),f=dist/lastDist,ns=Math.min(Math.max(T.s*f,.15),5);
    const wx=(pinchMid.x-T.x)/T.s,wy=(pinchMid.y-T.y)/T.s;
    T.s=ns;T.x=pinchMid.x-wx*ns;T.y=pinchMid.y-wy*ns;lastDist=dist;applyT();
  }else if(dragging&&e.touches.length===1){T.x=stx+e.touches[0].clientX-sx;T.y=sty+e.touches[0].clientY-sy;applyT();}
},{passive:false});
cw.addEventListener('touchend',e=>{
  if(e.touches.length===0){dragging=false;pinching=false;}
  if(e.touches.length===1){pinching=false;dragging=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;stx=T.x;sty=T.y;}
},{passive:true});

function zm(f){
  const cx=window.innerWidth/2,cy=window.innerHeight/2,ns=Math.min(Math.max(T.s*f,.15),5);
  const wx=(cx-T.x)/T.s,wy=(cy-T.y)/T.s;T.s=ns;T.x=cx-wx*ns;T.y=cy-wy*ns;applyT();
}
function rv(){T={x:0,y:0,s:1};applyT();}
cw.addEventListener('click',e=>{if(['cw','ml','sl'].includes(e.target.id)){closeP();fcat(null);}});
window.addEventListener('load',()=>{
  document.getElementById('wk-current').textContent=`V.${WEEKS[activeWeekIdx].w}`;
  build();buildWkSelector();
});
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(build,120);});
</script>
